<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Biblioteca Operacional BR</title>
  <link rel="stylesheet" href="style.css" />

<style>
  body {
    margin: 0;
    background: #061324;
  }

  .login-page {
  min-height: 100vh;
  width: 100%;
  background:
    radial-gradient(circle at top right, rgba(24, 213, 255, 0.13), transparent 34%),
    linear-gradient(135deg, #04101f 0%, #061324 48%, #081a2f 100%);
  color: #f4f9ff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  font-family: Arial, Helvetica, sans-serif;
}
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: rgba(16, 36, 61, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.11);
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
  }

  .login-card h1 {
    margin: 0 0 8px;
    font-size: 34px;
    line-height: 1;
    color: #f4f9ff;
  }

  .login-card p {
    margin: 0 0 24px;
    color: #9db5cc;
  }

  .login-card form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .login-card label {
    font-size: 14px;
    font-weight: 700;
    color: #f4f9ff;
  }

  .login-card input {
    width: 100%;
    min-height: 46px;
    padding: 0 14px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 10px;
    color: #f4f9ff;
    background: #07172a;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
  }

  .login-card input:focus {
    border-color: #18d5ff;
    box-shadow: 0 0 0 4px rgba(24, 213, 255, 0.12);
  }

  .login-card button {
    margin-top: 8px;
    min-height: 46px;
    padding: 0 16px;
    border: none;
    border-radius: 10px;
    background: #18d5ff;
    color: #061324;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
  }

  .login-card a {
    display: inline-block;
    margin-top: 20px;
    color: #18d5ff;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1>Biblioteca Operacional BR</h1>
      <p>Acesso interno</p>

      <form id="loginForm">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required />

        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" required />

        <button type="submit">Entrar</button>
      </form>

      <p id="loginMessage"></p>

      <a href="index.html">Voltar para a busca</a>
    </section>
  </main>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      window.BIBLIOTECA_BR_SUPABASE.url,
      window.BIBLIOTECA_BR_SUPABASE.anonKey
    );

    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      loginMessage.textContent = "Entrando...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        loginMessage.textContent = "Não foi possível entrar. Verifique e-mail e senha.";
        return;
      }

      window.location.href = "admin.html";
    });
  </script>
</body>
</html>
