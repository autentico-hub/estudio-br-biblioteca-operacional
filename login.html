<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Biblioteca Operacional BR</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <style>
    :root {
      --bg: #061726;
      --card: #10243d;
      --card-border: rgba(53, 214, 255, 0.18);
      --cyan: #18b7e8;
      --cyan-light: #35d6ff;
      --white: #f4f7f8;
      --text: #c9d2d8;
      --muted: #7f8c96;
      --danger: #e53935;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #082035 0%, #061726 45%, #020a12 100%);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 350px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 5px;
      padding: 42px 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .tag {
      color: var(--cyan-light);
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 46px;
      line-height: 0.98;
      letter-spacing: -1.5px;
      color: var(--white);
    }

    .descricao {
      margin: 18px 0 20px;
      font-size: 12px;
      line-height: 1.6;
      color: #d7eeff;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #d7eeff;
    }

    input {
      width: 100%;
      height: 31px;
      border-radius: 5px;
      border: 1px solid rgba(53, 214, 255, 0.18);
      background: #061220;
      color: var(--white);
      padding: 0 10px;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
    }

    input:focus {
      border-color: var(--cyan-light);
      box-shadow: 0 0 0 1px var(--cyan-light);
    }

    .btn-login {
      width: 100%;
      height: 26px;
      border: 1px solid var(--cyan);
      border-radius: 5px;
      background: rgba(24, 183, 232, 0.16);
      color: var(--white);
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 2px;
    }

    .btn-login:hover {
      background: rgba(24, 183, 232, 0.28);
    }

    .cadastro-area {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: var(--text);
    }

    .cadastro-area p {
      margin: 0 0 6px;
    }

    .cadastro-area a {
      color: var(--cyan-light);
      text-decoration: none;
      font-weight: 700;
    }

    .cadastro-area a:hover {
      text-decoration: underline;
    }

    .mensagem {
      margin-top: 12px;
      min-height: 18px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--danger);
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="login-card">
    <div class="tag">Acesso protegido</div>

    <h1>Biblioteca<br>Operacional<br>BR</h1>

    <p class="descricao">
      Entre com o acesso da equipe para consultar orientações internas do Estúdio BR Autêntico Pilates.
    </p>

    <form id="loginForm">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" autocomplete="email" required />

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" autocomplete="current-password" required />

      <button type="submit" class="btn-login">Entrar</button>

      <div class="cadastro-area">
        <p>Ainda não tem acesso?</p>
        <a href="cadastro.html">Solicitar cadastro</a>
      </div>

      <div id="mensagem" class="mensagem"></div>
    </form>
  </main>

  <script>
    const supabaseClient = supabase.createClient(
      window.BIBLIOTECA_BR_SUPABASE.url,
      window.BIBLIOTECA_BR_SUPABASE.anonKey
    );

    const loginForm = document.getElementById("loginForm");
    const mensagem = document.getElementById("mensagem");

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      mensagem.textContent = "";

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: senha
      });

      if (error) {
        mensagem.textContent = "E-mail ou senha inválidos.";
        return;
      }

      window.location.href = "index.html";
    });
  </script>
</body>
</html>
